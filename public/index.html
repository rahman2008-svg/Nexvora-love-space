<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexvora Love Space</title>

<style>

/* 🌌 RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* 🌈 animated background */
.bg{
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#ff4d6d33,#38bdf833,#22c55e33);
animation:move 10s infinite alternate;
z-index:0;
}

@keyframes move{
0%{transform:translate(0,0);}
100%{transform:translate(-10%,-10%);}
}

/* 💎 MAIN CONTAINER */
.card{
position:relative;
z-index:2;
width:92%;
max-width:420px;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
animation:pop 0.8s ease;
text-align:center;
}

/* ✨ animation */
@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* 💖 TITLE */
h1{
font-size:22px;
margin-bottom:10px;
}

/* 💌 INPUT */
input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
outline:none;
}

/* 🎭 CATEGORY CHIPS */
.chips{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
justify-content:center;
}

.chip{
padding:6px 10px;
border-radius:20px;
background:#1f2937;
font-size:12px;
cursor:pointer;
transition:0.3s;
}

.chip:hover{
background:#ff4d6d;
}

/* 🔘 BUTTONS */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.create{
background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
}

.copy{
background:linear-gradient(45deg,#22c55e,#86efac);
}

.music{
background:linear-gradient(45deg,#38bdf8,#60a5fa);
}

/* 📋 RESULT */
#result{
margin-top:10px;
font-size:13px;
word-break:break-all;
}

/* 💖 FOOTER */
.footer{
margin-top:12px;
font-size:11px;
opacity:0.6;
}

/* 💖 HEARTS */
.heart{
position:absolute;
font-size:18px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* 📱 MOBILE */
@media(max-width:500px){
.card{
padding:16px;
}
h1{
font-size:18px;
}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<h1>💖 Nexvora Love Space</h1>

<input id="title" placeholder="Title">
<textarea id="content" placeholder="Write your message..."></textarea>

<!-- 🎭 CATEGORY -->
<div class="chips">
<div class="chip">💖 Love</div>
<div class="chip">🎉 Birthday</div>
<div class="chip">💌 Invite</div>
<div class="chip">😢 Sorry</div>
<div class="chip">🌙 Night</div>
</div>

<input id="sender" placeholder="Your Name">

<button class="create" onclick="createPost()">✨ Create Message</button>

<div id="result"></div>

<button class="music" onclick="playMusic()">🎧 Play Music</button>

<div class="footer">
Abdur Rahman | Nexvora Lab's Ofc
</div>

</div>

<script>

/* 🚀 CREATE POST */
async function createPost(){

const data = {
title:title.value,
content:content.value,
sender:sender.value
};

const res = await fetch("/api/post",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

const out = await res.json();

result.innerHTML=`
<input value="${out.link}" id="link">
<button class="copy" onclick="copy()">📋 Copy Link</button>
`;
}

/* 📋 COPY */
function copy(){
document.getElementById("link").select();
document.execCommand("copy");
alert("Copied 💖");
}

/* 🎧 MUSIC */
let audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");

function playMusic(){
audio.play();
}

/* 💖 HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
