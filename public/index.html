<!DOCTYPE html>
<html>
<head>
<title>Nexvora App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff99b6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
}

input,textarea,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#ff4d6d;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

a{
color:#ff4d6d;
font-weight:bold;
}

footer{
margin-top:10px;
font-size:12px;
opacity:0.7;
}
</style>

</head>

<body>

<div class="box">

<h2>💖 Nexvora LoveSpace</h2>

<input id="title" placeholder="Title">
<textarea id="content" placeholder="Message"></textarea>

<select id="mode">
<option value="love">💖 Love Letter</option>
<option value="invite">📩 Invitation</option>
</select>

<select id="category">
<option value="general">General</option>
<option value="romantic">Romantic</option>
<option value="birthday">Birthday</option>
<option value="wedding">Wedding</option>
<option value="event">Event</option>
</select>

<button onclick="create()">Create Page</button>

<p id="res"></p>

<footer>
© Abdur Rahman | Nexvora Lab's Ofc
</footer>

</div>

<script>
async function create(){

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;
const mode=document.getElementById("mode").value;
const category=document.getElementById("category").value;

const res=await fetch("/api/create",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,content,mode,category})
});

const data=await res.json();

document.getElementById("res").innerHTML=
`🔗 <a href="${data.link}" target="_blank">Open Page</a>`;
}
</script>

</body>
</html>
