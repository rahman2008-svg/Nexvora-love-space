<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Love Space</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff4d6d,#ff99b6,#ffe3ec);
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
color:white;
}

/* HEADER */
.header{
text-align:center;
margin-top:10px;
}

.header h1{
font-size:28px;
font-weight:800;
}

.header p{
font-size:13px;
opacity:0.9;
}

/* CARD */
.card{
width:100%;
max-width:420px;
margin-top:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
border-radius:22px;
padding:18px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* INPUTS */
input, textarea, select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
outline:none;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff4d6d,#ff2e63);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.03);
}

/* LINK BOX */
.linkBox{
margin-top:12px;
padding:10px;
background:rgba(255,255,255,0.2);
border-radius:12px;
font-size:12px;
word-break:break-all;
}

/* COPY BUTTON */
.copyBtn{
margin-top:8px;
padding:8px;
width:100%;
border:none;
border-radius:10px;
background:white;
color:#ff2e63;
font-weight:600;
cursor:pointer;
}

/* CATEGORY */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:12px;
}

.cat{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:12px;
text-align:center;
font-size:11px;
cursor:pointer;
}

/* FOOTER */
footer{
margin-top:25px;
font-size:12px;
opacity:0.8;
text-align:center;
}

</style>
</head>

<body>

<div class="header">
<h1>💖 Nexvora Love Space</h1>
<p>Create Love • Emotion • Invitation Pages</p>
</div>

<div class="card">

<input id="title" placeholder="Enter Title 💌">

<textarea id="content" placeholder="Write your message ❤️"></textarea>

<input id="sender" placeholder="Your Name 👤">

<select id="category">
<option>💖 Love</option>
<option>🎉 Invitation</option>
<option>🎂 Birthday</option>
<option>🤝 Friend</option>
<option>💔 Sorry</option>
<option>💍 Anniversary</option>
</select>

<button class="btn" onclick="create()">✨ Create Page</button>

<div id="link" class="linkBox">Your link will appear here...</div>

<button class="copyBtn" onclick="copyLink()">📋 Copy Link</button>

<div class="grid">
<div class="cat">💖 Love</div>
<div class="cat">🎉 Invite</div>
<div class="cat">🎂 Birthday</div>
<div class="cat">🤝 Friend</div>
<div class="cat">💔 Sorry</div>
<div class="cat">💍 Love</div>
</div>

</div>

<footer>
Abdur Rahman | Nexvora Lab's Ofc
</footer>

<script>

let lastLink="";

/* CREATE PAGE */
async function create(){

const title=document.getElementById("title").value;
const content=document.getElementById("content").value;
const category=document.getElementById("category").value;
const sender=document.getElementById("sender").value;

const res=await fetch("/api/create",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({title,content,category,sender})
});

const data=await res.json();

lastLink=data.link;

document.getElementById("link").innerHTML=
"🔗 <b>Your Link:</b><br>"+data.link;
}

/* COPY LINK */
function copyLink(){
if(!lastLink){
alert("No link yet!");
return;
}
navigator.clipboard.writeText(lastLink);
alert("Link Copied ✔");
}

</script>

</body>
</html>
