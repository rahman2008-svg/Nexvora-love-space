<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexvora Love Space</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

/* 🌌 Animated Background */
.bg{
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, #ff4d6d44, transparent),
radial-gradient(circle at 80% 70%, #38bdf844, transparent);
animation: moveBg 8s infinite alternate;
}
@keyframes moveBg{
0%{transform:translateY(0);}
100%{transform:translateY(-40px);}
}

/* 💖 LOGO ANIMATION */
.logo{
font-size:28px;
text-align:center;
margin-bottom:10px;
animation: pop 1s ease;
}
@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

/* 💎 CARD */
.container{
position:relative;
width:90%;
max-width:420px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transform-style:preserve-3d;
transition:0.4s;
animation: float 4s infinite ease-in-out;
}

/* 🌊 Floating Animation */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

.container:hover{
transform:rotateX(5deg) rotateY(5deg) scale(1.02);
}

/* ✨ Inputs */
input, textarea, select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
outline:none;
background:#0f172a;
color:white;
}

/* 🔘 Button */
button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#ff4d6d,#ff99b6);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px #ff4d6d;
}

.copy{
background:linear-gradient(45deg,#22c55e,#4ade80);
}

/* 💌 RESULT ANIMATION */
#result{
margin-top:10px;
animation: fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* 📌 FOOTER */
.footer{
margin-top:15px;
text-align:center;
font-size:12px;
opacity:0.7;
animation: fadeIn 2s ease;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="logo">💖 Nexvora Love Space</div>

<input id="title" placeholder="Enter Title 💌">
<textarea id="content" placeholder="Write your message ❤️"></textarea>

<select id="category">
<option>Love</option>
<option>Invitation</option>
<option>Birthday</option>
<option>Sorry</option>
<option>Friend</option>
</select>

<input id="sender" placeholder="Your Name">

<button onclick="create()">✨ Create Link</button>

<div id="result"></div>

<div class="footer">
© 2026 Abdur Rahman | Nexvora Lab's Ofc
</div>

</div>

<script>
async function create(){
const data = {
title: title.value,
content: content.value,
category: category.value,
sender: sender.value
};

const res = await fetch("/api/post",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

const out = await res.json();

result.innerHTML = `
<input value="${out.link}" id="linkBox">
<button class="copy" onclick="copy()">📋 Copy Link</button>
`;
}

function copy(){
const input = document.getElementById("linkBox");
input.select();
document.execCommand("copy");
alert("Link Copied!");
}
</script>

</body>
</html>
